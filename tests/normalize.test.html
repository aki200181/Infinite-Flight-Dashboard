<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>normalize.js テスト</title>
<style>
  :root{
    --bg:#0d1520; --card:#162033; --border:#1a2744;
    --text:#e8edf5; --text-2:#8c9bb5; --accent:#3b9eff;
    --green:#00d68f; --red:#ff4d6a; --amber:#ffb020;
  }
  *{box-sizing:border-box;}
  body{font-family:ui-monospace,'JetBrains Mono',Menlo,monospace;background:var(--bg);color:var(--text);
       margin:0;padding:24px;line-height:1.45;}
  h1{color:var(--accent);font-size:20px;margin:0 0 4px;}
  .intro{color:var(--text-2);font-size:12px;margin-bottom:18px;}
  .intro code{background:var(--card);padding:1px 5px;border-radius:3px;}
  .summary{padding:12px 16px;border-radius:8px;font-weight:700;font-size:14px;margin:18px 0;}
  .summary.ok  {background:rgba(0,214,143,0.12);border:1px solid var(--green);color:var(--green);}
  .summary.fail{background:rgba(255,77,106,0.12);border:1px solid var(--red);  color:var(--red);}
  .group{margin:14px 0;background:var(--card);border:1px solid var(--border);border-radius:8px;
         padding:10px 14px;}
  .group h2{font-size:13px;color:var(--text-2);margin:0 0 6px;text-transform:uppercase;letter-spacing:0.04em;}
  .case{padding:3px 0;font-size:12.5px;border-left:3px solid transparent;padding-left:8px;margin-left:-3px;}
  .pass{color:var(--green);}
  .fail{color:var(--red);border-left-color:var(--red);background:rgba(255,77,106,0.06);}
  .label{color:var(--text);}
  .expected{color:var(--text-2);}
  .got{color:var(--amber);}
  .meta{color:var(--text-2);font-size:11px;margin-top:24px;}
</style>
</head>
<body>
<h1>normalize.js — 回帰テスト</h1>
<p class="intro">
  CSV / フィールド入力の揺れ補正ロジックを実コードで実行して結果を確認します。<br>
  <code>js/airports.js</code> → <code>js/normalize.js</code> を読み込み、本物の関数を呼んでアサート。<br>
  ブラウザで <code>tests/normalize.test.html</code> を開くだけで動作します（ビルド不要・ノービルド前提に整合）。
</p>
<div id="summary" class="summary"></div>
<div id="results"></div>
<div class="meta">ファイル：<code>tests/normalize.test.html</code> ／ 依存：<code>../js/airports.js</code>、<code>../js/normalize.js</code></div>

<!-- 実コードを読み込む（バージョンクエリ不要：file:// から手で開く前提） -->
<script src="../js/airports.js"></script>
<script src="../js/normalize.js"></script>

<script>
// =========================== ミニ assert ハーネス ===========================
// 依存追加なし。eq(label, actual, expected) で 1 ケース。group(name) でセクション切り替え。
// 最後に done() を呼ぶと合計をサマリーに表示。
let _passed = 0, _failed = 0;
let _currentGroup = null;

function group(name){
  const div = document.createElement('div');
  div.className = 'group';
  const h2 = document.createElement('h2');
  h2.textContent = name;
  div.appendChild(h2);
  document.getElementById('results').appendChild(div);
  _currentGroup = div;
}

function eq(label, actual, expected){
  const ok = (actual === expected) ||
             (Number.isNaN(actual) && Number.isNaN(expected));
  const row = document.createElement('div');
  row.className = 'case ' + (ok ? 'pass' : 'fail');
  if(ok){
    row.innerHTML = '<span class="label">✓ ' + escapeHtml(label) + '</span>';
    _passed++;
  } else {
    row.innerHTML = '<span class="label">✗ ' + escapeHtml(label) + '</span> ' +
                    '<span class="expected">expected ' + escapeHtml(JSON.stringify(expected)) + '</span> ' +
                    '<span class="got">got ' + escapeHtml(JSON.stringify(actual)) + '</span>';
    _failed++;
  }
  _currentGroup.appendChild(row);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, ch => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[ch]));
}

function done(){
  const total = _passed + _failed;
  const sum = document.getElementById('summary');
  if(_failed === 0){
    sum.className = 'summary ok';
    sum.textContent = '✓ ' + total + ' 件すべて合格';
  } else {
    sum.className = 'summary fail';
    sum.textContent = '✗ ' + _failed + ' / ' + total + ' 件失敗';
  }
}

// ============================ テストケース ============================

// ---- normalizeDate ----
group('normalizeDate（日付フォーマットゆれの吸収）');
eq('YYYY-MM-DD passthrough',  normalizeDate('2025-06-01'), '2025-06-01');
eq('YYYY/M/D zero-pad',       normalizeDate('2025/6/1'),   '2025-06-01');
eq('YYYY.MM.DD',              normalizeDate('2025.06.01'), '2025-06-01');
eq('YYYYMMDD compact',        normalizeDate('20250601'),   '2025-06-01');
eq('YY-MM-DD (2000s)',        normalizeDate('25-06-01'),   '2025-06-01');
eq('DD/MM/YYYY (day>12)',     normalizeDate('25/06/2025'), '2025-06-25');
eq('MM/DD/YYYY (ambiguous)',  normalizeDate('06/01/2025'), '2025-06-01');
eq('whitespace trim',         normalizeDate('  2025-06-01  '), '2025-06-01');
eq('garbage → null',          normalizeDate('hello'),      null);

// ---- normalizeTime ----
group('normalizeTime（所要時間フォーマットゆれの吸収）');
eq('1h30m passthrough', normalizeTime('1h30m'),  '1h30m');
eq('1:30 colon',         normalizeTime('1:30'),   '1h30m');
eq('01:30 padded',       normalizeTime('01:30'),  '1h30m');
eq('90m minutes only',   normalizeTime('90m'),    '1h30m');
eq('1H30M uppercase',    normalizeTime('1H30M'),  '1h30m');
eq('1h hours only',      normalizeTime('1h'),     '1h00m');
eq('1.5h decimal',       normalizeTime('1.5h'),   '1h30m');
eq('1h30 (missing m)',   normalizeTime('1h30'),   '1h30m');
eq('garbage → null',     normalizeTime('hello'),  null);

// ---- normalizeAirport ----
group('normalizeAirport（IATA→ICAO・旧コード救済）');
eq('ICAO passthrough',       normalizeAirport('RJTT'), 'RJTT');
eq('lowercase ICAO',         normalizeAirport('rjtt'), 'RJTT');
eq('IATA→ICAO (HND)',        normalizeAirport('HND'),  'RJTT');
eq('IATA→ICAO (ITM)',        normalizeAirport('ITM'),  'RJOO');
eq('IATA→ICAO (NRT)',        normalizeAirport('NRT'),  'RJAA');
eq('IATA→ICAO (LAX)',        normalizeAirport('LAX'),  'KLAX');
eq('IATA→ICAO (JFK)',        normalizeAirport('JFK'),  'KJFK');
eq('alias rescue NZQH→NZQN', normalizeAirport('NZQH'), 'NZQN');
eq('hyphen stripped',        normalizeAirport('R-JTT'), 'RJTT');
eq('null input → null',      normalizeAirport(null), null);
eq('empty input → null',     normalizeAirport(''),   null);
eq('unknown 4字 ICAO passthrough', normalizeAirport('ZZZZ'), 'ZZZZ');

// ---- normalizeAircraft ----
group('normalizeAircraft（機材コード正規化・別名表記の吸収）');
eq('canonical passthrough',  normalizeAircraft('B77W'),             'B77W');
eq('Boeing prefix strip',    normalizeAircraft('Boeing 777-300ER'), 'B77W');
eq('hyphen variant',         normalizeAircraft('777-300ER'),        'B77W');
eq('compact 77W',            normalizeAircraft('77W'),              'B77W');
eq('B-prefix rescue (B777300ER)', normalizeAircraft('B777300ER'),   'B77W');
eq('Airbus A350-900',        normalizeAircraft('A350-900'),         'A359');
eq('A350',                   normalizeAircraft('A350'),             'A359');
eq('A359 passthrough',       normalizeAircraft('A359'),             'A359');
eq('A220-300 (CSeries 300)', normalizeAircraft('A220-300'),         'BCS3');
eq('CS300',                  normalizeAircraft('CS300'),            'BCS3');
eq('737-800',                normalizeAircraft('737-800'),          'B738');
eq('737 MAX 8 (long)',       normalizeAircraft('737MAX8'),          'B38M');
eq('MAX8 short',             normalizeAircraft('MAX8'),             'B38M');
eq('737MAX (defaults to MAX 8)', normalizeAircraft('737MAX'),       'B38M');
eq('747-8I',                 normalizeAircraft('747-8I'),           'B748');
eq('A320neo',                normalizeAircraft('A320neo'),          'A320');
eq('Embraer 190',            normalizeAircraft('EMB190'),           'E190');
eq('CRJ-700',                normalizeAircraft('CRJ-700'),          'CRJ7');
eq('unknown → compact form', normalizeAircraft('Foo-123'),          'FOO123');
eq('null input → null',      normalizeAircraft(null),               null);

// ---- normalizeAirline ----
group('normalizeAirline（航空会社名・IATA/ICAO の正準化）');
eq('IATA NH → ANA',          normalizeAirline('NH'),  'All Nippon Airways');
eq('ICAO ANA → ANA',         normalizeAirline('ANA'), 'All Nippon Airways');
eq('full name passthrough',  normalizeAirline('All Nippon Airways'), 'All Nippon Airways');
eq('lowercase ana',          normalizeAirline('ana'), 'All Nippon Airways');
eq('JAL alias',              normalizeAirline('JAL'), 'Japan Airlines');
eq('JL (IATA)',              normalizeAirline('JL'),  'Japan Airlines');
eq('SQ (Singapore)',         normalizeAirline('SQ'),  'Singapore Airlines');
eq('unknown passthrough',    normalizeAirline('My Custom Airline'), 'My Custom Airline');
eq('null input → null',      normalizeAirline(null), null);
eq('whitespace-only → null', normalizeAirline('   '), null);

done();
</script>
</body>
</html>
